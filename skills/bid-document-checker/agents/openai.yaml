interface:
  display_name: "投标文件检查"
  short_description: "按阶段检查投标文件，支持轻量检查摘要和正式Markdown/HTML检测报告。"
  default_prompt: "使用 $bid-document-checker 执行投标文件检查：先确认检查阶段、轮次和输出模式；过程复核默认 lightweight_check，只输出结构化摘要，不生成 Markdown、HTML 或验收卡文件；初稿整本、DOCX 成稿、定稿/盖章版/提交前终检，或用户明确要求报告时使用 formal_report。读取技能内置验收卡模板、招标解析产物和上游验收成果；项目级验收指南仅在用户指定、项目有特殊口径或需要解释规则来源时读取。先形成本轮检查项，把招标要求映射到 PRE、G01-G06、D00-D11；无法归入 G/D 的要求才新增 TENDER-xx，未映射要求未处理时不得无保留通过。按本轮检查项逐项回填；当前问题清单是 P0/P1/P2 唯一完整问题台账，数量只按唯一编号统计，G/D/PRE 明细只写证据位置、关联问题编号和“详见当前问题清单”。formal_report 先生成 Markdown 结构源，再生成 HTML 用户版；Markdown 是内容和顺序来源，HTML 使用 references/html-report-template.html，只调整视觉重点和折叠状态，不重新执行检查、不重新判断结论、不重排章节；向用户回报时优先提供 HTML 文件路径或预览入口，Markdown 作为归档和审计补充。结构化中间文件由 bid-reviewer 过程复核；本岗位正式检查最终 DOCX/PDF/交付稿结果，发现残留占位符、缺图、漏表、空表或固定格式未渲染时按正式验收问题处理。"
